<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c3aed" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Lightning bolt (⚡) -->
  <g filter="url(#glow)" transform="translate(256,256) scale(1.1) translate(-256,-256)">
    <path d="M290 80 L180 260 L240 260 L220 432 L340 240 L275 240 Z" 
          fill="url(#bolt)" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  </g>
  
  <!-- Subtle tech dots -->
  <circle cx="120" cy="140" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="380" cy="160" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="140" cy="380" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="400" cy="350" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="100" cy="260" r="2" fill="rgba(255,255,255,0.15)"/>
  <circle cx="420" cy="250" r="2" fill="rgba(255,255,255,0.15)"/>
</svg>
